<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Grocery List App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1100px;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        #list .card {
            transition: 0.2s ease;
        }

            #list .card:hover {
                transform: scale(1.01);
            }

        h1 {
            font-weight: 700;
        }

        #error div {
            background: #ffe5e5;
            padding: 6px;
            margin-top: 5px;
            border-radius: 6px;
            color: #b30000;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <h1 class="text-center mb-2">Grocery List App</h1>
        <p class="text-center text-muted mb-4">Manage your grocery items easily</p>

        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3">Add / Edit Item</h5>

            <div class="row g-2">

                <div class="col">
                    <input id="name" class="form-control" placeholder="Name">
                    <small id="nameError" class="text-danger"></small>
                </div>

                <div class="col">
                    <input id="quantity" type="number" class="form-control" placeholder="Qty">
                    <small id="qtyError" class="text-danger"></small>
                </div>

                <div class="col">
                    <input id="price" type="number" step="0.01" min="0" class="form-control" placeholder="Price">                    <small id="priceError" class="text-danger"></small>
                </div>

                <div class="col-auto">
                    <button class="btn btn-primary" onclick="addItem()">Save</button>
                </div>

            </div>

            <small id="error" class="text-danger mt-2"></small>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">

            <div class="input-group shadow-sm" style="max-width: 350px;">
                <span class="input-group-text bg-white border-end-0">
                    Search
                </span>
                <input id="search"
                       class="form-control border-start-0"
                       placeholder="Search item...">
            </div>

            <div class="alert alert-info mb-0 shadow-sm">
                Total: <b id="total">0.00 $</b>
            </div>

        </div>

        <div id="list" class="row g-3"></div>
    </div>

    <script>
        const API_URL = "https://localhost:7138/grocery_list";

        let editId = null;
        let allItems = [];

        async function loadItems() {
            const res = await fetch(API_URL);

            allItems = await res.json();

            renderItems();
        }

        function renderItems() {

            const list = document.getElementById("list");
            list.innerHTML = "";

            const searchValue =
                document.getElementById("search").value.toLowerCase();

            const filteredItems = allItems.filter(item =>
                item.name.toLowerCase().includes(searchValue)
            );

            if (filteredItems.length === 0) {

                list.innerHTML = `
            <div class="col-12">
                <div class="alert alert-secondary">
                    No items found.
                </div>
            </div>
        `;

                document.getElementById("total").innerText = "0.00 $";
                return;
            }

            let total = allItems.reduce(
                (sum, item) => sum + item.quantity * item.unitPrice,
                0
            );

            filteredItems.forEach(item => {

                const div = document.createElement("div");

                div.className = "col-md-4";

                div.innerHTML = `
                <div class="card p-3 shadow-sm h-100">

                <h5>${item.name}</h5>

                <div>Qty: ${item.quantity}</div>

                <div>Price: ${item.unitPrice}$</div>

                <div>
                    <b>Subtotal:</b>
                    ${(item.quantity * item.unitPrice).toFixed(2)}$
                </div>

                <div class="mt-3">

                    <button
                        class="btn btn-warning btn-sm me-2"
                        onclick='startEdit("${item.id}", "${item.name}", ${item.quantity}, ${item.unitPrice})'>
                        Edit
                    </button>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="deleteItem('${item.id}')">
                        Delete
                    </button>

                </div>

            </div>
        `;

                list.appendChild(div);
            });

            document.getElementById("total").innerText =
                total.toFixed(2) + " $";
        }

        async function addItem() {
            const name = document.getElementById("name").value;
            const quantity = document.getElementById("quantity").value;
            const price = document.getElementById("price").value;

            const error = document.getElementById("error");
            error.innerHTML = "";

            let errors = [];

            if (!name || name.trim() === "") {
                errors.push("Please enter the product name.");
            }

            if (!quantity || parseInt(quantity) < 1) {
                errors.push("The quantity must be at least 1.");
            }

            if (!price || parseFloat(price) <= 0) {
                errors.push("Please enter a valid price.");
            }

            if (errors.length > 0) {
                error.innerHTML = errors.map(e => `<div>${e}</div>`).join("");
                return;
            }

            const payload = {
                name,
                quantity: parseInt(quantity),
                unitPrice: parseFloat(price)
            };

            let res;

            if (editId) {
                res = await fetch(`${API_URL}/${editId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                editId = null;
            } else {
                res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            }

            if (!res.ok) {
                error.innerHTML = "Server error.";
                return;
            }

            clearForm();
            loadItems();
        }

        function startEdit(id, name, quantity, price) {
            editId = id;

            document.getElementById("name").value = name;
            document.getElementById("quantity").value = quantity;
            document.getElementById("price").value = price;
        }

        async function deleteItem(id) {
            await fetch(`${API_URL}/${id}`, {
                method: "DELETE"
            });

            loadItems();
        }

        function clearForm() {
            document.getElementById("name").value = "";
            document.getElementById("quantity").value = "";
            document.getElementById("price").value = "";
        }

        loadItems();
        document.getElementById("search")
            .addEventListener("input", renderItems);

        document.getElementById("name").addEventListener("input", validateName);
        document.getElementById("quantity").addEventListener("input", validateQuantity);
        document.getElementById("price").addEventListener("input", validatePrice);

        document.getElementById("name").addEventListener("keydown", function (e) {
            if (/\d/.test(e.key)) {
                e.preventDefault();
            }
        });

        function validateName() {
            const value = document.getElementById("name").value;
            const error = document.getElementById("nameError");

            if (/\d/.test(value)) {
                error.textContent = "Name cannot contain numbers.";
            } else {
                error.textContent = "";
            }
        }

        function validateQuantity() {
            const value = document.getElementById("quantity").value;
            const error = document.getElementById("qtyError");

            if (!value || parseInt(value) < 1) {
                error.textContent = "Quantity must be at least 1.";
            } else {
                error.textContent = "";
            }
        }

        function validatePrice() {
            const value = document.getElementById("price").value;
            const error = document.getElementById("priceError");

            if (!value || parseFloat(value) <= 0) {
                error.textContent = "Price must be valid.";
            } else {
                error.textContent = "";
            }
        }
    </script>

</body>
</html>
